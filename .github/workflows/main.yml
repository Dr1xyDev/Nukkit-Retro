name: Build Nukkit-Retro

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    
    - name: Install LevelDB dependency
      run: |
        mvn install:install-file \
          -Dfile=lib/leveldb.jar \
          -DgroupId=com.tinfoiled.mcpe.leveldb \
          -DartifactId=leveldb \
          -Dversion=0.8 \
          -Dpackaging=jar
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: nukkit-retro-build
        path: target/nukkit-retro-*.jar
        retention-days: 30
    
    - name: Test Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 7
